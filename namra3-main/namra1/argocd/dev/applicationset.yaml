apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: namra1-ace-applicationset
  namespace: openshift-gitops
spec:
  generators:
    - git:
        repoURL: https://github.com/TapestryESB/namra3-gitops.git
        revision: HEAD
        files:
        - path: "ACE-ROSA/**/overlays/**/dev_config.json"
  template:
    metadata:
      name: '{{microservice}}'
      annotations:
        notifications.argoproj.io/subscribe.on-sync-succeeded.tapestry: uasim@tapestry.com;nali@tapestry.com
    spec:
  project: namra1
      source:
        repoURL: https://github.com/TapestryESB/namra3-gitops.git
        targetRevision: HEAD
        path: "ACE-ROSA/{{folder}}/overlays/dev/"
      destination:
        server: https://kubernetes.default.svc
        namespace: int
      ignoreDifferences:
        - group: appconnect.ibm.com
          kind: IntegrationRuntime
          jsonPointers:
            - /spec/configurations
      syncPolicy:
        automated:
          prune: true
          selfHeal: true  
