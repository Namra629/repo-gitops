apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: systems-bootstrap
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: openshift-gitops
    server: https://kubernetes.default.svc
  project: systems
  source:
    path: argocd/dev-rosa/
    repoURL: https://github.com/TapestryESB/well-done-gitops.git
