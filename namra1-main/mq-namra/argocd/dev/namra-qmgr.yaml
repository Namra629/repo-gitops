apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namra-queue-manager
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: int
    server: https://kubernetes.default.svc
  project: namra
  source:
    path: MQ-ROSA/test-qmgr/dev/
    repoURL: https://github.com/TapestryESB/namra1-gitops.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true  
