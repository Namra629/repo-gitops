apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namra-mq
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: openshift-gitops ## incase of openshift change this to openshift-gitops
    server: https://kubernetes.default.svc
  project: namra
  source:
    path: MQ-ROSA/argocd/dev/  ## path where it reads other argo manifists
    repoURL: https://github.com/TapestryESB/namra1-gitops.git
    targetRevision: main
  # syncPolicy:
  #   automated:
  #     prune: true  
  #     selfHeal: true
