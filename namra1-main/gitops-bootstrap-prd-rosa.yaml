apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namra-bootstrap
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: openshift-gitops
    server: https://kubernetes.default.svc
  project: namra
  source:
    path: argocd/prd-rosa/
    repoURL: https://github.com/TapestryESB/namra1-gitops.git
