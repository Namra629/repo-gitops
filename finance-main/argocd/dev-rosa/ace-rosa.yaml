apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wms-pictickets-ace
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: openshift-gitops ## incase of openshift change this to openshift-gitops
    server: https://kubernetes.default.svc
  project: wms-pictickets
  source:
    path: ACE-ROSA/argocd/dev/  ## path where it reads other argo manifists
    repoURL: https://github.com/TapestryESB/finance-gitops.git
    targetRevision: main
#  syncPolicy:
