apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: wms-pictickets-mq-applicationset-pp
  namespace: openshift-gitops
spec:
  generators:
    - git:
        repoURL: https://github.com/TapestryESB/finance-gitops.git
        revision: HEAD
        files:
        - path: "MQ-ROSA/**/pp_config.json"
  template:
    metadata:
      name: '{{microservice}}-{{env}}'
    spec:
  project: wms-pictickets
      source:
        repoURL: https://github.com/TapestryESB/finance-gitops.git
        targetRevision: HEAD
        path: "MQ-ROSA/{{folder}}/{{env}}/"
      destination:
        server: https://kubernetes.default.svc
